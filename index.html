<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will you go on a date with me ? ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffe6f0;
    padding-top:50px;
}

img{
    width:250px;
    border-radius:20px;
}

button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
}

#noBtn{
    position:absolute;
}
</style>
</head>
<body>

<div id="question">
    <img src="https://i.imgur.com/T6b6T7K.png">
    <h1? Will you go on a date with me❤️</h1>

    <button onclick="yesClicked()">yes 😍</button>
    <button id="noBtn">no 😢</button>
</div>

<div id="datePicker" style="display:none;">
    <h1>wait, you ACTUALY said yes?? ❤️</h1>
    <p>So... When are you free?</p>

    <input type="date">
    <br><br>

    <button onclick="finish()">Pick a day</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

function yesClicked(){
    document.getElementById("question").style.display = "none";
    document.getElementById("datePicker").style.display = "block";
}

function finish(){
    alert("Cant wait anymore ❤️");
}
</script>

</body>
</html>
