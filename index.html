<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Invitation ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffe6f0;
    text-align:center;
    margin:0;
    padding:30px;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

img{
    width:280px;
    border-radius:20px;
    margin-bottom:20px;
}

h1{
    color:#333;
}

button{
    padding:15px 30px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.yes-btn{
    background:#ff69b4;
    color:white;
}

#noBtn{
    background:#ddd;
    position:absolute;
}

.food-btn{
    font-size:20px;
    min-width:180px;
}

input{
    padding:10px;
    font-size:18px;
    margin:10px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=600" alt="Dog">

    <h1>Would you like to go on a date with me? ❤️</h1>

    <button class="yes-btn" onclick="nextPage(2)">Yes 😍</button>
    <button id="noBtn">No 😢</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
    <h1>WAIT YOU ACTUALLY SAID YES?? 😳</h1>

    <button class="yes-btn" onclick="nextPage(3)">
        Okay okay 😅
    </button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
    <h1>So... when are you free? 📅</h1>

    <div>
        <p>Pick a day</p>
        <input type="date" id="date">
    </div>

    <div>
        <p>What time?</p>
        <input type="time" id="time">
    </div>

    <br>

    <button class="yes-btn" onclick="nextPage(4)">
        Continue ➜
    </button>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page">
    <h1>What are we feeling? 🍽️</h1>

    <button class="food-btn" onclick="nextPage(5)">🍔 Burgers</button><br>
    <button class="food-btn" onclick="nextPage(5)">🍕 Pizza</button><br>
    <button class="food-btn" onclick="nextPage(5)">🍝 Pasta</button><br>
    <button class="food-btn" onclick="nextPage(5)">🍣 Sushi</button><br>
    <button class="food-btn" onclick="nextPage(5)">🐟 Fish</button><br>
    <button class="food-btn" onclick="nextPage(5)">🥩 Steak</button>
</div>

<!-- PAGE 5 -->
<div id="page5" class="page">
    <h1>❤️ Glad you didn't say no.</h1>

    <h2>Be ready, I'm coming to get you 😎</h2>

    <p>See you soon ✨</p>
</div>

<script>

function nextPage(pageNumber){

    document.querySelectorAll(".page").forEach(page=>{
        page.classList.remove("active");
    });

    document.getElementById("page"+pageNumber)
        .classList.add("active");
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {

    const maxX = window.innerWidth - 150;
    const maxY = window.innerHeight - 100;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
});

</script>

</body>
</html>
